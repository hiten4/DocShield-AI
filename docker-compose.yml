services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: befree
      POSTGRES_USER: befree
      POSTGRES_PASSWORD: befree
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U befree"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  clamav:
    image: clamav/clamav:stable
    ports: ["3310:3310"]
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres: {condition: service_healthy}
      qdrant: {condition: service_started}
      redis: {condition: service_started}
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      postgres: {condition: service_healthy}
      qdrant: {condition: service_started}
      redis: {condition: service_started}
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    command: python -m app.workers.rq_worker

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  qdrant_data:
  hf_cache: